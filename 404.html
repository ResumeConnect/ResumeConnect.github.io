<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found | ResumeConnect</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:linear-gradient(135deg,#2563eb,#06b6d4);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

overflow:hidden;

}

.card{

background:#ffffff;

max-width:700px;

width:100%;

padding:60px 40px;

border-radius:24px;

text-align:center;

box-shadow:0 25px 70px rgba(0,0,0,.20);

animation:fadeIn .8s ease;

}

.icon{

width:120px;

height:120px;

margin:auto;

border-radius:50%;

background:#fee2e2;

display:flex;

justify-content:center;

align-items:center;

font-size:60px;

color:#ef4444;

}

.error{

font-size:80px;

font-weight:800;

margin:25px 0 10px;

color:#2563eb;

}

h2{

font-size:30px;

margin-bottom:15px;

color:#1f2937;

}

p{

color:#6b7280;

line-height:1.8;

margin-bottom:35px;

}

.buttons{

display:flex;

justify-content:center;

gap:15px;

flex-wrap:wrap;

}

.btn{

padding:15px 30px;

border-radius:40px;

font-weight:600;

text-decoration:none;

transition:.3s;

}

.primary{

background:#2563eb;

color:#fff;

}

.primary:hover{

background:#1d4ed8;

transform:translateY(-3px);

}

.secondary{

border:2px solid #2563eb;

color:#2563eb;

}

.secondary:hover{

background:#2563eb;

color:#fff;

}

footer{

margin-top:35px;

font-size:14px;

color:#94a3b8;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:600px){

.error{

font-size:60px;

}

h2{

font-size:24px;

}

.card{

padding:40px 25px;

}

.btn{

width:100%;

}

}

</style>

</head>

<body>

<div class="card">

<div class="icon">

<i class="fa-solid fa-triangle-exclamation"></i>

</div>

<div class="error">

404

</div>

<h2>

Oops! Page Not Found

</h2>

<p>

The page you're looking for doesn't exist, may have been moved, or the URL may be incorrect.

Please return to the homepage or upload your resume to continue your job search.

</p>

<div class="buttons">

<a href="index.html"
class="btn primary">

<i class="fa-solid fa-house"></i>

Go to Home

</a>

<a href="javascript:history.back()"
class="btn secondary">

<i class="fa-solid fa-arrow-left"></i>

Go Back

</a>

</div>

<footer>

© 2026 ResumeConnect. All Rights Reserved.

</footer>

</div>

</body>

</html>
